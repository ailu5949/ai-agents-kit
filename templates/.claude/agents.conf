# 三 Agent 协作工作流 — 项目级配置(被 hook 脚本 source)
# 路径均为相对项目根的相对路径,或绝对路径。

BACKEND_DIR="backend"
FRONTEND_DIR="frontend"

# 可执行命令(给 Codex / Claude 审查时用)
BACKEND_TEST_CMD="./mvnw test"
FRONTEND_TEST_CMD="npm test"
BACKEND_LINT_CMD="./mvnw spotless:check"
FRONTEND_LINT_CMD="npm run lint"

# 技术栈描述(展示用)
BACKEND_STACK="Spring Boot 3.x + JPA"
FRONTEND_STACK="Vite + React"

# Codex CLI 可执行路径 — install.sh 会自动探测,可手动覆盖
CODEX_BIN="codex"

# 失败重试上限
MAX_RETRY=3
